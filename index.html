<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=DM+Sans:wght@400;500;600;700&display=swap');

  :root {
    --bg:        #060c18;
    --bg2:       #0d1526;
    --bg3:       #0f1e30;
    --border:    #1e293b;
    --border2:   #0f1e30;
    --text:      #cbd5e1;
    --text2:     #64748b;
    --text3:     #334155;
    --accent:    #38bdf8;
    --danger:    #ef4444;
    --warn:      #f59e0b;
    --safe-top:  env(safe-area-inset-top, 0px);
    --safe-bot:  env(safe-area-inset-bottom, 0px);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', system-ui, sans-serif;
    min-height: 100vh;
    min-height: -webkit-fill-available;
    overscroll-behavior: none;
  }

  /* ── HEADER ── */
  .header {
    background: linear-gradient(180deg, #0c1a2e, var(--bg));
    border-bottom: 1px solid var(--border);
    padding: calc(14px + var(--safe-top)) 16px 14px;
    position: sticky;
    top: 0;
    z-index: 100;
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
  }

  .header-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 12px;
  }

  .header h1 {
    font-size: 18px;
    font-weight: 700;
    color: #f1f5f9;
    letter-spacing: -0.02em;
    line-height: 1.2;
  }

  .header-sub {
    font-size: 10px;
    color: var(--text3);
    margin-top: 2px;
    font-family: 'JetBrains Mono', monospace;
  }

  .sync-badge {
    font-size: 10px;
    font-family: 'JetBrains Mono', monospace;
    padding: 3px 8px;
    border-radius: 4px;
    font-weight: 600;
    transition: all 0.3s;
  }
  .sync-badge.live   { background: #10b98122; color: #10b981; border: 1px solid #10b98133; }
  .sync-badge.saving { background: #f59e0b22; color: #f59e0b; border: 1px solid #f59e0b33; }
  .sync-badge.error  { background: #ef444422; color: #ef4444; border: 1px solid #ef444433; }
  .sync-badge.offline{ background: #64748b22; color: #64748b; border: 1px solid #64748b33; }

  /* call counters */
  .counters {
    display: flex;
    gap: 5px;
    flex-wrap: wrap;
  }

  .counter-card {
    background: var(--bg2);
    border-radius: 7px;
    padding: 6px 9px;
    flex: 1 1 60px;
    min-width: 60px;
    border: 1px solid transparent;
    transition: border-color 0.2s;
  }

  .counter-name  { font-size: 8px; text-transform: uppercase; letter-spacing: 0.07em; font-weight: 700; margin-bottom: 3px; }
  .counter-num   { font-size: 17px; font-weight: 700; font-family: 'JetBrains Mono', monospace; line-height: 1; }
  .counter-left  { font-size: 8px; color: var(--text2); margin-top: 2px; }

  /* ── TABS ── */
  .tabs {
    display: flex;
    gap: 5px;
    padding: 10px 16px 0;
    overflow-x: auto;
    scrollbar-width: none;
    -webkit-overflow-scrolling: touch;
  }
  .tabs::-webkit-scrollbar { display: none; }

  .tab-btn {
    padding: 6px 13px;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    border-radius: 6px;
    background: transparent;
    color: var(--text2);
    border: 1px solid var(--border);
    white-space: nowrap;
    transition: all 0.15s;
    flex-shrink: 0;
  }
  .tab-btn.active {
    background: var(--accent);
    color: #0c1821;
    border-color: var(--accent);
  }

  /* ── CONTENT ── */
  .content {
    padding: 12px 16px;
    max-width: 700px;
    margin: 0 auto;
    padding-bottom: calc(24px + var(--safe-bot));
  }

  .section-label {
    font-size: 10px;
    color: var(--text2);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-bottom: 8px;
    font-family: 'JetBrains Mono', monospace;
  }

  /* ── ROWS ── */
  .day-row {
    display: flex;
    align-items: center;
    gap: 7px;
    padding: 7px 10px;
    border-radius: 7px;
    cursor: pointer;
    margin-bottom: 3px;
    transition: opacity 0.15s, transform 0.1s;
    border: 1px solid var(--border2);
    border-left: 3px solid transparent;
    active: scale(0.98);
  }
  .day-row:active { transform: scale(0.98); opacity: 0.85; }
  .day-row.is-cory   { background: linear-gradient(135deg, #0f172a, #1e293b); }
  .day-row.is-past   { opacity: 0.45; background: #06090f; }
  .day-row.is-today  { border-color: var(--accent) !important; }
  .day-row.no-person { border-style: dashed; border-color: #141f33; background: var(--bg); }

  .row-date {
    min-width: 112px;
    flex-shrink: 0;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--text2);
  }
  .row-date.today { color: var(--accent); font-weight: 700; }
  .row-date.past  { color: var(--text3); }

  .person-badge {
    width: 72px;
    flex-shrink: 0;
  }
  .badge {
    border-radius: 4px;
    padding: 2px 6px;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.03em;
    display: inline-block;
  }
  .badge-empty { color: #1e3a5f; font-size: 11px; font-style: italic; }

  .rot-tag {
    width: 92px;
    flex-shrink: 0;
  }
  .rot-badge {
    border-radius: 4px;
    padding: 2px 6px;
    font-size: 9px;
    font-weight: 600;
    display: inline-block;
  }

  .row-notes { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 1px; }
  .note-comment   { font-size: 10px; color: #475569; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .note-conflict  { font-size: 10px; color: #78350f; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

  .countdown {
    font-size: 11px;
    font-family: 'JetBrains Mono', monospace;
    font-weight: 700;
    flex-shrink: 0;
  }

  .edit-icon { font-size: 11px; color: var(--text3); flex-shrink: 0; }

  /* ── MONTH HEADERS ── */
  .month-header {
    font-size: 10px;
    font-weight: 700;
    color: var(--text3);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    margin: 16px 0 6px;
    padding-bottom: 4px;
    border-bottom: 1px solid var(--border2);
    font-family: 'JetBrains Mono', monospace;
  }

  /* ── RESIDENT PICKER ── */
  .resident-picker {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    margin-bottom: 14px;
  }
  .res-btn {
    padding: 7px 11px;
    border-radius: 7px;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    font-weight: 700;
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text2);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2px;
    transition: all 0.15s;
  }
  .res-btn span.sub { font-size: 9px; font-weight: 400; opacity: 0.7; }

  /* ── ROTATION TABLE ── */
  .rot-table-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; }
  .rot-table {
    border-collapse: collapse;
    width: 100%;
    font-size: 11px;
  }
  .rot-table th {
    text-align: left;
    padding: 6px 7px;
    color: var(--text2);
    font-weight: 600;
    border-bottom: 1px solid var(--border);
    white-space: nowrap;
    font-size: 10px;
  }
  .rot-table td {
    padding: 6px 5px;
    border-bottom: 1px solid var(--border2);
    white-space: nowrap;
  }

  /* ── MODAL ── */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.85);
    z-index: 1000;
    display: flex;
    align-items: flex-end;
    justify-content: center;
    padding-bottom: var(--safe-bot);
    animation: fadeIn 0.15s ease;
  }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

  .modal-sheet {
    background: #0d1526;
    border: 1px solid var(--border);
    border-radius: 18px 18px 0 0;
    padding: 20px 20px calc(20px + var(--safe-bot));
    width: 100%;
    max-width: 500px;
    max-height: 90vh;
    overflow-y: auto;
    animation: slideUp 0.2s ease;
  }
  @keyframes slideUp { from { transform: translateY(60px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

  .modal-handle {
    width: 36px; height: 4px;
    background: var(--border);
    border-radius: 2px;
    margin: 0 auto 16px;
  }

  .modal-date { font-size: 14px; font-weight: 700; color: #e2e8f0; margin-bottom: 2px; }
  .modal-rot  { font-size: 11px; margin-bottom: 14px; margin-top: 3px; }

  .modal-section-label {
    font-size: 10px;
    color: var(--text2);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-bottom: 8px;
    font-family: 'JetBrains Mono', monospace;
  }

  /* who's on what */
  .who-grid {
    display: flex;
    flex-wrap: wrap;
    gap: 4px;
    margin-bottom: 14px;
  }
  .who-chip {
    display: flex;
    align-items: center;
    gap: 4px;
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 5px;
    padding: 3px 7px;
    font-size: 10px;
  }

  /* person selector */
  .person-selector {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-bottom: 14px;
  }
  .sel-btn {
    padding: 6px 10px;
    border-radius: 6px;
    font-size: 12px;
    font-weight: 700;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text2);
    transition: all 0.12s;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 1px;
  }
  .sel-btn .rot-sub { font-size: 8px; font-weight: 400; }

  .modal-input {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 7px;
    padding: 9px 12px;
    color: var(--text);
    font-size: 13px;
    font-family: 'DM Sans', sans-serif;
    outline: none;
    margin-bottom: 10px;
    transition: border-color 0.15s;
  }
  .modal-input:focus { border-color: var(--accent); }

  .modal-btns { display: flex; gap: 8px; margin-top: 8px; }
  .btn-cancel {
    flex: 1; padding: 10px;
    background: transparent; border: 1px solid var(--border);
    border-radius: 8px; color: var(--text2);
    cursor: pointer; font-size: 13px; font-family: 'DM Sans', sans-serif;
    font-weight: 600;
  }
  .btn-save {
    flex: 2; padding: 10px;
    background: var(--accent); border: none;
    border-radius: 8px; color: #0c1821;
    cursor: pointer; font-size: 13px; font-family: 'DM Sans', sans-serif;
    font-weight: 700;
  }

  .seed-note {
    margin-top: 12px;
    padding-top: 10px;
    border-top: 1px solid var(--border);
    font-size: 10px;
    color: var(--text3);
  }

  /* ── LOADING ── */
  .loading {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 12px;
    color: var(--text3);
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
  }
  .spinner {
    width: 24px; height: 24px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── FILTER PILLS ── */
  .filter-pills {
    display: flex;
    gap: 5px;
    flex-wrap: wrap;
    margin-bottom: 10px;
  }
  .pill {
    padding: 4px 9px;
    font-size: 10px;
    font-weight: 600;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    border-radius: 5px;
    background: transparent;
    color: var(--text2);
    border: 1px solid var(--border);
    transition: all 0.12s;
  }
  .pill.active { background: var(--accent); color: #0c1821; border-color: var(--accent); }

  /* ── COVERAGE TAB ── */
  .coverage-block {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px;
    margin-bottom: 10px;
  }
  .coverage-block-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 10px;
  }
  .coverage-month {
    font-size: 12px;
    font-weight: 700;
    color: #f1f5f9;
    font-family: 'JetBrains Mono', monospace;
  }
  .coverage-period {
    font-size: 10px;
    color: var(--text2);
  }
  .coverage-day-row {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 7px 0;
    border-bottom: 1px solid var(--border2);
  }
  .coverage-day-row:last-child { border-bottom: none; }
  .coverage-dayname {
    width: 36px;
    flex-shrink: 0;
    font-size: 11px;
    font-weight: 700;
    font-family: 'JetBrains Mono', monospace;
    color: var(--text2);
  }
  .coverage-dayname.highlight { color: var(--accent); }
  .coverage-owners {
    display: flex;
    flex-wrap: wrap;
    gap: 5px;
    flex: 1;
  }
  .coverage-owner-chip {
    display: flex;
    align-items: center;
    gap: 4px;
    border-radius: 5px;
    padding: 3px 8px;
    font-size: 11px;
    font-weight: 700;
  }
  .coverage-rule {
    font-size: 9px;
    color: var(--text3);
    font-style: italic;
    align-self: center;
    margin-left: auto;
    flex-shrink: 0;
  }
  .coverage-legend {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-bottom: 14px;
    padding: 10px 12px;
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 8px;
  }
  .coverage-legend-item {
    display: flex;
    align-items: center;
    gap: 5px;
    font-size: 10px;
    color: var(--text2);
  }
  .coverage-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .block-nav {
    display: flex;
    gap: 5px;
    flex-wrap: wrap;
    margin-bottom: 12px;
  }

  /* ── INSTALL BANNER ── */
  .install-banner {
    background: linear-gradient(135deg, #0f172a, #1a2744);
    border: 1px solid #1d4ed844;
    border-radius: 10px;
    padding: 12px 14px;
    margin-bottom: 14px;
    display: flex;
    align-items: flex-start;
    gap: 10px;
  }
  .install-banner .icon { font-size: 22px; flex-shrink: 0; }
  .install-banner .text { font-size: 12px; color: #94a3b8; line-height: 1.5; }
  .install-banner .text strong { color: var(--accent); display: block; margin-bottom: 2px; font-size: 13px; }
  .install-close {
    background: none; border: none; color: var(--text2); cursor: pointer;
    font-size: 16px; padding: 0; margin-left: auto; flex-shrink: 0;
  }
</style>
</head>

// ── HELPERS ───────────────────────────────────────────────────

function parseDate(s){ const[y,m,d]=s.split("-").map(Number); return new Date(y,m-1,d); }
function daysUntil(s){ const t=new Date(); t.setHours(0,0,0,0); return Math.round((parseDate(s)-t)/86400000); }
function fmtShort(s){ return parseDate(s).toLocaleDateString("en-US",{month:"short",day:"numeric",weekday:"short"}); }
function fmtFull(s){ return parseDate(s).toLocaleDateString("en-US",{month:"long",day:"numeric",year:"numeric",weekday:"long"}); }
function monthKey(s){ const d=parseDate(s); return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}`; }
function monthLabel(s){ return parseDate(s).toLocaleDateString("en-US",{month:"long",year:"numeric"}); }
function resRot(person,date){ if(!person||!RESIDENT_ROTATIONS[person])return null; return RESIDENT_ROTATIONS[person][monthKey(date)]||null; }
function esc(s){ const d=document.createElement("div"); d.textContent=s; return d.innerHTML; }

// ── STATE ─────────────────────────────────────────────────────

let overrides = {};
let view = "upcoming";
let filterMonth = "all";
let minePerson = "Cory";
let editDate = null;
let syncStatus = "connecting";
let showInstall = !window.matchMedia("(display-mode: standalone)").matches;

const months = [];
const seenMk = new Set();
SEED.forEach(r=>{ const k=monthKey(r.date); if(!seenMk.has(k)){seenMk.add(k);months.push([k,monthLabel(r.date)]);} });

const grouped = {};
SEED.forEach(r=>{ const k=monthKey(r.date); if(!grouped[k])grouped[k]=[]; grouped[k].push(r); });

function merged(){ return SEED.map(e=>({...e,...(overrides[e.date]||{})})); }
function getMerged(date){ const s=SEED.find(r=>r.date===date)||{}; return {...s,...(overrides[date]||{})}; }

// ── FIREBASE ──────────────────────────────────────────────────

let db;
let dbRef;

function initFirebase(){
  try {
    const app = initializeApp(firebaseConfig);
    db = getDatabase(app);
    dbRef = ref(db, "callschedule/overrides");

    onValue(dbRef, (snap)=>{
      overrides = snap.val() || {};
      syncStatus = "live";
      render();
    }, (err)=>{
      console.error(err);
      syncStatus = "error";
      render();
    });
  } catch(e){
    console.error("Firebase init failed:", e);
    syncStatus = "error";
    render();
  }
}

async function saveOverride(date, changes){
  syncStatus = "saving";
  renderSyncBadge();
  try {
    const updates = {};
    updates[`callschedule/overrides/${date}`] = changes;
    await update(ref(db), updates);
  } catch(e){
    console.error(e);
    syncStatus = "error";
    renderSyncBadge();
  }
}

// ── RENDER ────────────────────────────────────────────────────

function renderSyncBadge(){
  const el = document.getElementById("sync-badge");
  if(!el) return;
  const labels = {live:"● Live",saving:"↑ Saving…",error:"⚠ Offline",connecting:"… Connecting",offline:"○ Offline"};
  el.className = `sync-badge ${syncStatus}`;
  el.textContent = labels[syncStatus]||syncStatus;
}

function rotBadgeHTML(rot){
  if(!rot) return "";
  const c = ROTATION_COLORS[rot]||"#64748b";
  return `<span class="rot-badge" style="background:${c}18;color:${c};border:1px solid ${c}33">${esc(rot)}</span>`;
}

function personBadgeHTML(person){
  if(!person) return `<span class="badge-empty">—</span>`;
  const c = COLORS[person]||"#94a3b8";
  return `<span class="badge" style="background:${c}22;color:${c};border:1px solid ${c}44">${esc(person)}</span>`;
}

function rowHTML(entry){
  const data = getMerged(entry.date);
  const diff = daysUntil(entry.date);
  const isPast = diff < 0;
  const isToday = diff === 0;
  const isCory = data.person === "Cory";
  const rot = data.person ? resRot(data.person, entry.date) : null;
  const rotC = rot ? (ROTATION_COLORS[rot]||"#64748b") : null;
  const pC = data.person ? (COLORS[data.person]||"#94a3b8") : null;

  let cls = "day-row";
  if(isCory) cls += " is-cory";
  if(isPast) cls += " is-past";
  if(isToday) cls += " is-today";
  if(!data.person) cls += " no-person";

  const borderLeft = isCory ? `3px solid ${isPast?"#334155":"#38bdf8"}` : "3px solid transparent";
  const border = isToday ? "1px solid #38bdf8" : isCory ? `1px solid ${isPast?"#1e3a5f":"#1d4ed8"}44` : !data.person ? "1px dashed #141f33" : "1px solid #0f1e30";

  const countdown = (!isPast && diff <= 30)
    ? `<span class="countdown" style="color:${diff<=3?"#ef4444":diff<=7?"#f59e0b":"#38bdf8"}">${diff===0?"NOW":`${diff}d`}</span>`
    : "";

  return `<div class="${cls}" style="border:${border};border-left:${borderLeft}" data-date="${entry.date}">
    <div class="row-date ${isToday?"today":isPast?"past":""}">${isToday?"▶ ":""}${esc(fmtShort(entry.date))}</div>
    <div class="person-badge">${personBadgeHTML(data.person)}</div>
    <div class="rot-tag">${rot && !isPast ? rotBadgeHTML(rot) : ""}</div>
    <div class="row-notes">
      ${data.comment ? `<div class="note-comment">💬 ${esc(data.comment)}</div>` : ""}
      ${data.unavailable ? `<div class="note-conflict">🚫 ${esc(data.unavailable)}</div>` : ""}
    </div>
    ${countdown}
    <span class="edit-icon">✎</span>
  </div>`;
}

function countersHTML(){
  const m = merged();
  let html = "";
  RESIDENTS.forEach(r=>{
    const total = m.filter(e=>e.person===r).length;
    const upcoming = m.filter(e=>e.person===r && daysUntil(e.date)>=0).length;
    const c = COLORS[r];
    html += `<div class="counter-card" style="border-color:${c}22">
      <div class="counter-name" style="color:${c}">${r}</div>
      <div class="counter-num" style="color:${c}">${total}</div>
      <div class="counter-left">${upcoming} left</div>
    </div>`;
  });
  const unassigned = m.filter(r=>!r.person).length;
  html += `<div class="counter-card">
    <div class="counter-name" style="color:#475569">Open</div>
    <div class="counter-num" style="color:#ef4444">${unassigned}</div>
    <div class="counter-left">unassigned</div>
  </div>`;
  return html;
}

function upcomingHTML(){
  const next30 = merged().filter(r=>{ const d=daysUntil(r.date); return d>=0&&d<=30; });
  if(!next30.length) return `<p style="color:#334155;font-size:13px;padding:20px 0">No calls in the next 30 days.</p>`;
  return `<div class="section-label">All calls · next 30 days (${next30.length})</div>`
    + next30.map(e=>rowHTML(e)).join("");
}

function mineHTML(){
  const m = merged();
  const personCalls = m.filter(e=>e.person===minePerson);
  const upcomingCount = personCalls.filter(e=>daysUntil(e.date)>=0).length;

  // resident picker
  let picker = `<div class="resident-picker">`;
  RESIDENTS.forEach(r=>{
    const total = m.filter(e=>e.person===r).length;
    const up = m.filter(e=>e.person===r&&daysUntil(e.date)>=0).length;
    const c = COLORS[r];
    const active = r===minePerson;
    picker += `<button class="res-btn" data-res="${r}" style="${active?`background:${c}22;border-color:${c};color:${c}`:""}">
      <span>${r}</span><span class="sub">${total}c · ${up} left</span>
    </button>`;
  });
  picker += `</div>`;

  // rotation legend for selected person
  let legend = `<div style="display:flex;gap:5px;flex-wrap:wrap;margin-bottom:14px">`;
  const rots = RESIDENT_ROTATIONS[minePerson]||{};
  const seen = new Set();
  Object.values(rots).forEach(rot=>{
    if(!seen.has(rot)){ seen.add(rot); legend += rotBadgeHTML(rot)+" "; }
  });
  legend += `</div>`;

  let list = `<div class="section-label">${minePerson}'s calls · ${personCalls.length} total · ${upcomingCount} upcoming</div>`;
  if(!personCalls.length) list += `<p style="color:#334155;font-size:13px;padding:20px 0">No calls assigned yet.</p>`;

  months.forEach(([k, label])=>{
    const entries = (grouped[k]||[]).filter(r=>getMerged(r.date).person===minePerson);
    if(!entries.length) return;
    list += `<div class="month-header">${label} — ${entries.length}</div>`;
    list += entries.map(e=>rowHTML(e)).join("");
  });

  return picker + legend + list;
}

function scheduleHTML(){
  const disp = filterMonth==="all" ? months.map(([k])=>k) : [filterMonth];
  let pills = `<div class="filter-pills">
    <button class="pill${filterMonth==="all"?" active":""}" data-month="all">All</button>`;
  months.forEach(([k,label])=>{
    pills += `<button class="pill${filterMonth===k?" active":""}" data-month="${k}">${label.slice(0,3)} '${label.slice(-2)}</button>`;
  });
  pills += `</div>`;

  let legend = `<div style="display:flex;gap:5px;flex-wrap:wrap;margin-bottom:10px">`;
  RESIDENTS.forEach(r=>{ const c=COLORS[r]; legend+=`<span class="badge" style="background:${c}22;color:${c};border:1px solid ${c}44">${r}</span>`; });
  legend += `</div>`;

  let rows = "";
  disp.forEach(k=>{
    const entries = grouped[k]||[];
    if(!entries.length) return;
    rows += `<div class="month-header">${monthLabel(entries[0].date)}</div>`;
    rows += entries.map(e=>rowHTML(e)).join("");
  });

  return pills + legend + rows;
}

// ── CALL COVERAGE RULES ──────────────────────────────────────
// Based on program call structure:
//   Monday    → Joints service
//   Tuesday   → (no fixed service rule — general pool)
//   Wednesday → Foot & Ankle + Peds split
//   Thursday  → (no fixed service rule — general pool)
//   Friday    → (no fixed service rule — general pool)
//   Saturday  → Sports + Joints split
//   Sunday    → Foot & Ankle + Peds split
//
// For each day we identify which residents are on the owning
// rotation(s) that block, then show them as the expected coverage.

const DAY_RULES = [
  { day: "Sunday",    label: "Sun", rotations: ["Peds BAMC","Foot & Ankle"], rule: "Peds + F&A split"      },
  { day: "Monday",    label: "Mon", rotations: ["Sports","Joints"],          rule: "Sports + Joints split" },
  { day: "Tuesday",   label: "Tue", rotations: ["SAMMC-Trauma"],             rule: "Trauma"                },
  { day: "Wednesday", label: "Wed", rotations: ["Peds BAMC","Foot & Ankle"], rule: "Peds + F&A split"      },
  { day: "Thursday",  label: "Thu", rotations: ["Sports","Joints"],          rule: "Sports + Joints split" },
  { day: "Friday",    label: "Fri", rotations: ["SAMMC-Trauma"],             rule: "Trauma"                },
  { day: "Saturday",  label: "Sat", rotations: ["Sports","Joints"],          rule: "Sports + Joints split" },
];

// 2-month blocks
const COVERAGE_BLOCKS = [
  { label:"Jul–Aug",  keys:["2026-07","2026-08"] },
  { label:"Sep–Oct",  keys:["2026-09","2026-10"] },
  { label:"Nov–Dec",  keys:["2026-11","2026-12"] },
  { label:"Jan–Feb",  keys:["2027-01","2027-02"] },
  { label:"Mar–Apr",  keys:["2027-03","2027-04"] },
  { label:"May–Jun",  keys:["2027-05","2027-06"] },
];

let coverageBlock = "2026-07"; // selected block key

function coverageHTML(){
  // Block nav pills
  let nav = `<div class="block-nav">`;
  COVERAGE_BLOCKS.forEach(b=>{
    const active = coverageBlock === b.keys[0];
    nav += `<button class="pill${active?" active":""}" data-cblock="${b.keys[0]}">${b.label}</button>`;
  });
  nav += `</div>`;

  // Which block is selected?
  const block = COVERAGE_BLOCKS.find(b=>b.keys[0]===coverageBlock) || COVERAGE_BLOCKS[0];
  const mk = block.keys[0]; // use first month of block for rotation lookup

  // For each resident, what rotation are they on this block?
  const residentRotThisBlock = {};
  RESIDENTS.forEach(r=>{
    residentRotThisBlock[r] = RESIDENT_ROTATIONS[r][mk] || null;
  });

  // Legend: show who's on what this block
  let legend = `<div class="coverage-legend">`;
  RESIDENTS.forEach(r=>{
    const rot = residentRotThisBlock[r];
    const pc = COLORS[r];
    const rc = rot ? (ROTATION_COLORS[rot]||"#64748b") : "#64748b";
    legend += `<div class="coverage-legend-item">
      <div class="coverage-dot" style="background:${pc}"></div>
      <span style="color:${pc};font-weight:700">${r}</span>
      <span style="color:#334155">→</span>
      ${rot ? `<span style="color:${rc};font-weight:600">${rot}</span>` : `<span style="color:#334155">—</span>`}
    </div>`;
  });
  legend += `</div>`;

  // Build the day-by-day coverage card
  let card = `<div class="coverage-block">
    <div class="coverage-block-header">
      <span class="coverage-month">${block.label} Coverage</span>
      <span class="coverage-period" style="font-size:10px;color:#475569">by rotation rule</span>
    </div>`;

  DAY_RULES.forEach(({day, label, rotations, rule})=>{
    const isHighlight = true; // all days have a fixed rule now

    // Find residents whose rotation this block matches the owning rotations
    let owners = [];
    if(rotations.length > 0){
      RESIDENTS.forEach(r=>{
        const rot = residentRotThisBlock[r];
        if(rot && rotations.includes(rot)) owners.push(r);
      });
    }

    // If no rule-based owners (Tue/Thu/Fri), show all residents as "pool"
    const isPool = rotations.length === 0;

    card += `<div class="coverage-day-row">
      <span class="coverage-dayname${isHighlight?" highlight":""}">${label}</span>
      <div class="coverage-owners">`;

    if(isPool){
      card += `<span style="font-size:11px;color:#334155;font-style:italic">All residents (pool)</span>`;
    } else if(owners.length === 0){
      card += `<span style="font-size:11px;color:#334155;font-style:italic">No residents on ${rotations.join("/")} this block</span>`;
    } else {
      owners.forEach(r=>{
        const pc = COLORS[r];
        const rot = residentRotThisBlock[r];
        const rc = rot ? (ROTATION_COLORS[rot]||"#64748b") : "#64748b";
        card += `<span class="coverage-owner-chip" style="background:${pc}18;color:${pc};border:1px solid ${pc}33">
          ${esc(r)}
          <span style="font-size:9px;color:${rc};font-weight:400;margin-left:2px">${rot||""}</span>
        </span>`;
      });
    }

    card += `</div>
      <span class="coverage-rule">${rule}</span>
    </div>`;
  });

  card += `</div>`;

  // Also show a note about the rules
  const rulesNote = `<div style="padding:10px 12px;background:#0d1526;border:1px solid #1e293b;border-radius:8px;font-size:11px;color:#475569;line-height:1.6">
    <div style="font-weight:700;color:#64748b;margin-bottom:6px;font-size:10px;text-transform:uppercase;letter-spacing:0.08em">Call Structure Rules</div>
    <div>🟣 <strong style="color:#94a3b8">Sun / Wed</strong> — Peds + Foot &amp; Ankle split</div>
    <div>🔵 <strong style="color:#94a3b8">Mon / Thu / Sat</strong> — Sports + Joints split</div>
    <div>🔴 <strong style="color:#94a3b8">Tue / Fri</strong> — Trauma</div>
  </div>`;

  return `<div class="section-label">Expected coverage by rotation — select a block</div>`
    + nav + legend + card + rulesNote;
}

function rotationsHTML(){
  const BLOCKS = [
    {label:"Jul–Aug",keys:["2026-07","2026-08"]},
    {label:"Sep–Oct",keys:["2026-09","2026-10"]},
    {label:"Nov–Dec",keys:["2026-11","2026-12"]},
    {label:"Jan–Feb",keys:["2027-01","2027-02"]},
    {label:"Mar–Apr",keys:["2027-03","2027-04"]},
    {label:"May–Jun",keys:["2027-05","2027-06"]},
  ];
  let html = `<div class="section-label">Class of 2030 — AY 2026–27</div><div class="rot-table-wrap"><table class="rot-table"><thead><tr><th>Resident</th>`;
  BLOCKS.forEach(b=>{ html+=`<th style="text-align:center">${b.label}</th>`; });
  html += `</tr></thead><tbody>`;
  RESIDENTS.forEach(r=>{
    const c=COLORS[r];
    html+=`<tr><td><span style="font-weight:700;color:${c};font-size:12px">${r}</span></td>`;
    BLOCKS.forEach(b=>{
      const rot=RESIDENT_ROTATIONS[r][b.keys[0]];
      html+=`<td style="text-align:center">${rotBadgeHTML(rot)}</td>`;
    });
    html+=`</tr>`;
  });
  html+=`</tbody></table></div>`;
  return html;
}

function installBannerHTML(){
  if(!showInstall) return "";
  return `<div class="install-banner">
    <span class="icon">📲</span>
    <div class="text">
      <strong>Add to Home Screen</strong>
      In Safari: tap the Share button → "Add to Home Screen" to install this as an app
    </div>
    <button class="install-close" id="install-close">×</button>
  </div>`;
}

function modalHTML(){
  if(!editDate) return "";
  const data = getMerged(editDate);
  const seed = SEED.find(r=>r.date===editDate)||{};

  let whoGrid = `<div class="who-grid">`;
  RESIDENTS.forEach(r=>{
    const rot=resRot(r,editDate);
    const rc=rot?(ROTATION_COLORS[rot]||"#64748b"):"#64748b";
    const pc=COLORS[r];
    whoGrid+=`<div class="who-chip">
      <span style="font-weight:700;color:${pc};font-size:10px">${r}</span>
      <span style="color:#334155;font-size:9px">→</span>
      <span style="color:${rc};font-size:10px;font-weight:600">${rot||"—"}</span>
    </div>`;
  });
  whoGrid+=`</div>`;

  let selButtons = `<button class="sel-btn" data-sel="" style="${!data.person?"border-color:#475569;background:#1e293b;color:#94a3b8":""}">— none</button>`;
  RESIDENTS.forEach(r=>{
    const c=COLORS[r];
    const rot=resRot(r,editDate);
    const rc=rot?(ROTATION_COLORS[rot]||"#64748b"):"";
    const active=data.person===r;
    selButtons+=`<button class="sel-btn" data-sel="${r}" style="${active?`border-color:${c};background:${c}22;color:${c}`:""}">
      <span>${r}</span>
      ${rot?`<span class="rot-sub" style="color:${rc}">${rot}</span>`:""}
    </button>`;
  });

  const seedNote = (seed.person||seed.comment||seed.unavailable)
    ? `<div class="seed-note">Original: ${esc([seed.person,seed.comment,seed.unavailable].filter(Boolean).join(" · "))}</div>`
    : "";

  return `<div class="modal-overlay" id="modal-overlay">
    <div class="modal-sheet">
      <div class="modal-handle"></div>
      <div class="modal-date">${fmtFull(editDate)}</div>
      <div class="modal-rot" style="color:#64748b;font-size:11px">📍 Cory: ${resRot("Cory",editDate)||"—"}</div>

      <div class="modal-section-label">Who's on rotation</div>
      ${whoGrid}

      <div class="modal-section-label">On Call</div>
      <div class="person-selector">${selButtons}</div>

      <div class="modal-section-label">Note</div>
      <input class="modal-input" id="modal-comment" placeholder="e.g. Super team week, swap…" value="${esc(data.comment||"")}">

      <div class="modal-section-label">Conflict / Unavailable</div>
      <input class="modal-input" id="modal-unavail" placeholder="e.g. Cory on boat, Megan wedding…" value="${esc(data.unavailable||"")}">

      <div class="modal-btns">
        <button class="btn-cancel" id="modal-cancel">Cancel</button>
        <button class="btn-save" id="modal-save">Save</button>
      </div>
      ${seedNote}
    </div>
  </div>`;
}

let _modalPerson = null;

function render(){
  const app = document.getElementById("app");
  const tabDefs = [
    {id:"upcoming", label:"🗓 Next 30"},
    {id:"mine",     label:"My Calls"},
    {id:"schedule", label:"Full Schedule"},
    {id:"coverage", label:"📅 Coverage"},
    {id:"rotations",label:"📋 Rotations"},
  ];

  let tabsHTML = tabDefs.map(t=>
    `<button class="tab-btn${view===t.id?" active":""}" data-tab="${t.id}">${t.label}</button>`
  ).join("");

  let bodyHTML = "";
  if(view==="upcoming") bodyHTML = upcomingHTML();
  else if(view==="mine") bodyHTML = mineHTML();
  else if(view==="schedule") bodyHTML = scheduleHTML();
  else if(view==="coverage") bodyHTML = coverageHTML();
  else if(view==="rotations") bodyHTML = rotationsHTML();

  app.innerHTML = `
    <div class="header">
      <div class="header-top" style="max-width:700px;margin:0 auto">
        <div>
          <h1>PGY-2 Call Schedule</h1>
          <div class="header-sub">Cory · Jul 2026–Jun 2027</div>
        </div>
        <span id="sync-badge" class="sync-badge ${syncStatus}">
          ${syncStatus==="live"?"● Live":syncStatus==="saving"?"↑ Saving…":syncStatus==="error"?"⚠ Offline":"… Connecting"}
        </span>
      </div>
      <div class="counters" style="max-width:700px;margin:10px auto 0">${countersHTML()}</div>
    </div>
    <div class="tabs">${tabsHTML}</div>
    <div class="content">
      ${installBannerHTML()}
      ${bodyHTML}
    </div>
    ${modalHTML()}
  `;

  // restore modal selected person
  if(editDate){
    _modalPerson = getMerged(editDate).person || null;
    highlightModalSel();
  }

  attachEvents();
}

function highlightModalSel(){
  document.querySelectorAll(".sel-btn").forEach(btn=>{
    const v = btn.dataset.sel;
    const r = v||null;
    const c = r ? COLORS[r] : null;
    if(r===_modalPerson || (!r && !_modalPerson)){
      btn.style.borderColor = c||"#475569";
      btn.style.background = c?`${c}22`:"#1e293b";
      btn.style.color = c||"#94a3b8";
    } else {
      btn.style.borderColor = "";
      btn.style.background = "";
      btn.style.color = "";
    }
  });
}

function attachEvents(){
  // tabs
  document.querySelectorAll(".tab-btn").forEach(btn=>{
    btn.addEventListener("click",()=>{ view=btn.dataset.tab; render(); });
  });

  // resident picker (mine tab)
  document.querySelectorAll(".res-btn").forEach(btn=>{
    btn.addEventListener("click",()=>{ minePerson=btn.dataset.res; render(); });
  });

  // month filter pills
  document.querySelectorAll(".pill").forEach(btn=>{
    if(btn.dataset.month !== undefined){
      btn.addEventListener("click",()=>{ filterMonth=btn.dataset.month; render(); });
    }
    if(btn.dataset.cblock !== undefined){
      btn.addEventListener("click",()=>{ coverageBlock=btn.dataset.cblock; render(); });
    }
  });

  // day rows → open modal
  document.querySelectorAll(".day-row").forEach(row=>{
    row.addEventListener("click",()=>{ editDate=row.dataset.date; _modalPerson=getMerged(editDate).person||null; render(); });
  });

  // install close
  const ic = document.getElementById("install-close");
  if(ic) ic.addEventListener("click",()=>{ showInstall=false; render(); });

  // modal
  const overlay = document.getElementById("modal-overlay");
  if(overlay){
    // close on overlay click
    overlay.addEventListener("click",(e)=>{ if(e.target===overlay){ editDate=null; render(); } });

    document.getElementById("modal-cancel").addEventListener("click",()=>{ editDate=null; render(); });

    // person selection
    document.querySelectorAll(".sel-btn").forEach(btn=>{
      btn.addEventListener("click",()=>{
        _modalPerson = btn.dataset.sel || null;
        highlightModalSel();
      });
    });

    document.getElementById("modal-save").addEventListener("click",async ()=>{
      const comment = document.getElementById("modal-comment").value.trim()||null;
      const unavail = document.getElementById("modal-unavail").value.trim()||null;
      const changes = { person:_modalPerson||null, comment, unavailable:unavail };
      overrides[editDate] = changes;
      const savedDate = editDate;
      editDate = null;
      render();
      await saveOverride(savedDate, changes);
    });
  }
}

// ── BOOT ──────────────────────────────────────────────────────

render(); // show loading state first
initFirebase();

</script>
</body>
</html>
